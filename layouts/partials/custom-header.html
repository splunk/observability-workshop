{{ $fonts := resources.Get "css/fonts.css" | resources.Fingerprint }}
<link rel="stylesheet" href="{{ $fonts.RelPermalink }}" integrity="{{ $fonts.Data.Integrity }}">
<style>
    :root {
        --MAIN-WIDTH-MAX: 130rem;
        --MENU-WIDTH-L: 23rem;
    }
    p {
        margin: 0.75rem 0;
    }
    /* Cap Hugo's syntax-highlighted code blocks (which it wraps in
     * div.highlight). Use the tag-qualified selector so we don't
     * accidentally match Relearn's search-result <mark class="highlight">
     * inside headings, which would give them spurious scrollbars. */
    div.highlight {
        max-height: 500px;
        overflow-y: auto;
    }
    pre:not(.mermaid) {
        margin: 0;
    }

    /* Presenter-mode visuals (the .presenter-only callout itself) live in
     * theme-splunk-base.css with per-variant palettes in theme-splunk-light
     * /-dark.css so the cue card adapts to the active Relearn variant. The
     * toggle pill below is fixed-position UI and stays here. */

    /* @keyframes for the presenter card live HERE, not in the variant CSS,
     * because Hugo's Relearn variant system wraps theme-splunk-*.css inside
     * a :root[data-r-theme-variant=...] selector. Per the CSS spec, an
     * @keyframes rule nested inside a selector rule is invalid and Chrome
     * silently drops it — which is why the animation never ran. This inline
     * <style> block is rendered directly into <head> at top level, so the
     * keyframes survive parsing. */
    @keyframes presenter-ping {
        0%   { transform: scale(1);   opacity: 1; }
        50%  { transform: scale(1.5); opacity: 0.5; }
        100% { transform: scale(2.5); opacity: 0; }
    }

    /* Toggle pill is hidden by default — only presenters who arrive with
     * ?presenter=1 see it (in the "on" state, magenta), and clicking it
     * exits presenter mode. Attendees never see the control. */
    .presenter-toggle { display: none; }
    body.presenter-mode .presenter-toggle {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        z-index: 9999;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.75rem;
        font: 600 0.75rem/1 system-ui, -apple-system, "Segoe UI", sans-serif;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #fff;
        background: var(--SPLUNK-magenta, #ce0070);
        border: 0;
        border-radius: 999px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
        cursor: pointer;
        transition: background 0.15s ease;
    }
    body.presenter-mode .presenter-toggle:hover {
        background: var(--SPLUNK-magenta-deep, #a30058);
    }
    .presenter-toggle__dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: #fff;
    }

    @media print {
        .presenter-only,
        .presenter-toggle { display: none !important; }
    }
</style>
<script>
    (function () {
        var KEY = 'presenter-mode';
        var params = new URLSearchParams(window.location.search);
        if (params.has('presenter')) {
            var v = params.get('presenter');
            if (v === '0' || v === 'false') {
                localStorage.removeItem(KEY);
            } else {
                localStorage.setItem(KEY, '1');
            }
        }
        function apply() {
            document.body.classList.toggle(
                'presenter-mode',
                localStorage.getItem(KEY) === '1'
            );
        }
        function inject() {
            if (document.getElementById('presenter-toggle')) return;
            var btn = document.createElement('button');
            btn.id = 'presenter-toggle';
            btn.type = 'button';
            btn.className = 'presenter-toggle';
            btn.title = 'Exit presenter mode';
            btn.innerHTML =
                '<span class="presenter-toggle__dot"></span>' +
                '<span class="presenter-toggle__text">Presenter on</span>';
            btn.addEventListener('click', function () {
                localStorage.removeItem(KEY);
                apply();
            });
            document.body.appendChild(btn);
            apply();
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', inject);
        } else {
            inject();
        }
    })();
</script>
