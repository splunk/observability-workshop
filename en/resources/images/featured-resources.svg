<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open book — Resources">
  <defs>
    <linearGradient id="brand" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="10%" stop-color="#FF007F"/>
      <stop offset="90%" stop-color="#FF9000"/>
    </linearGradient>
    <linearGradient id="brand-soft" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="10%" stop-color="#FF007F" stop-opacity="0.12"/>
      <stop offset="90%" stop-color="#FF9000" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="bg-bloom" cx="0.5" cy="0.55" r="0.65">
      <stop offset="0%" stop-color="#FF007F" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#FF9000" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0C1724" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft accent bloom -->
  <rect width="1600" height="1000" fill="url(#bg-bloom)"/>

  <!-- Decorative light trail curves echoing the hero background -->
  <g fill="none" stroke="url(#brand)" stroke-linecap="round" opacity="0.18">
    <path d="M -80 720 Q 400 600 800 720 T 1700 720" stroke-width="2"/>
    <path d="M -80 780 Q 400 660 800 780 T 1700 780" stroke-width="1.5"/>
    <path d="M -80 840 Q 400 720 800 840 T 1700 840" stroke-width="1"/>
  </g>

  <!-- Open book — two pages meeting at a centre spine -->
  <g transform="translate(800 500)" stroke-linejoin="round" stroke-linecap="round">
    <!-- Left page -->
    <path d="M -380 -200 L -20 -240 L -20 200 L -380 240 Z"
          fill="none" stroke="url(#brand)" stroke-width="6"/>
    <!-- Right page -->
    <path d="M 380 -200 L 20 -240 L 20 200 L 380 240 Z"
          fill="none" stroke="url(#brand)" stroke-width="6"/>

    <!-- Page text-line decorations -->
    <g stroke="url(#brand)" stroke-width="4" stroke-linecap="round" opacity="0.55">
      <!-- left page lines -->
      <line x1="-340" y1="-150" x2="-60"  y2="-178"/>
      <line x1="-340" y1="-90"  x2="-60"  y2="-118"/>
      <line x1="-340" y1="-30"  x2="-180" y2="-44"/>
      <line x1="-340" y1="30"   x2="-60"  y2="14"/>
      <line x1="-340" y1="90"   x2="-220" y2="78"/>
      <!-- right page lines -->
      <line x1="60"  y1="-178" x2="340"  y2="-150"/>
      <line x1="60"  y1="-118" x2="340"  y2="-90"/>
      <line x1="60"  y1="-58"  x2="220"  y2="-44"/>
      <line x1="60"  y1="14"   x2="340"  y2="30"/>
      <line x1="60"  y1="74"   x2="180"  y2="64"/>
    </g>

    <!-- Bookmark ribbon -->
    <path d="M 240 -226 L 240 -60 L 268 -90 L 296 -60 L 296 -232 Z"
          fill="url(#brand)" opacity="0.9"/>
  </g>

  <!-- Particle "knowledge dots" -->
  <g fill="url(#brand)">
    <circle cx="220"  cy="220" r="4" opacity="0.7"/>
    <circle cx="1380" cy="160" r="5" opacity="0.6"/>
    <circle cx="1240" cy="300" r="3" opacity="0.5"/>
    <circle cx="320"  cy="320" r="3" opacity="0.5"/>
    <circle cx="1440" cy="820" r="4" opacity="0.6"/>
    <circle cx="180"  cy="780" r="3" opacity="0.5"/>
  </g>
</svg>
