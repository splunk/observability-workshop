version: workshop-2026-06
currency: USD

# These are workshop examples collected from public pricing models on 2026-06-09.
# Always verify current prices and use your organization's approved internal rates
# before using this for production chargeback.
sources:
  openai_api_pricing: https://developers.openai.com/api/docs/pricing
  github_copilot_models_pricing: https://docs.github.com/en/copilot/reference/copilot-billing/models-and-pricing
  hugging_face_inference_providers_pricing: https://huggingface.co/docs/inference-providers/en/pricing
  hugging_face_inference_endpoints_pricing: https://huggingface.co/docs/inference-endpoints/en/pricing
  aws_ec2_on_demand_pricing: https://aws.amazon.com/ec2/pricing/on-demand/
  ollama_usage_metrics: https://docs.ollama.com/api/usage

token_models:
  # Public managed API style examples.
  github-copilot-gpt-5-mini:
    basis: public_token_rate
    input_usd_per_1m_tokens: 0.25
    cached_input_usd_per_1m_tokens: 0.025
    output_usd_per_1m_tokens: 2.00
    source: github_copilot_models_pricing

  openai-gpt-5.4-nano:
    basis: public_token_rate
    input_usd_per_1m_tokens: 0.20
    cached_input_usd_per_1m_tokens: 0.02
    output_usd_per_1m_tokens: 1.25
    source: openai_api_pricing

  openai-gpt-5.4-mini:
    basis: public_token_rate
    input_usd_per_1m_tokens: 0.75
    cached_input_usd_per_1m_tokens: 0.075
    output_usd_per_1m_tokens: 4.50
    source: openai_api_pricing

  # Internal workshop model. This is not a vendor-published token price for NIM.
  # Use it only to keep the lab math simple when the application runs on shared GPUs.
  internal-llama-3.2-1b-instruct:
    basis: workshop_internal_showback
    input_usd_per_1m_tokens: 0.20
    output_usd_per_1m_tokens: 1.25
    source: workshop_assumption

gpu_hourly:
  hf-endpoint-t4-aws-x1:
    basis: dedicated_endpoint_hourly
    gpu_type: NVIDIA T4
    gpu_count: 1
    hourly_usd: 0.50
    source: hugging_face_inference_endpoints_pricing

  hf-endpoint-l4-aws-x1:
    basis: dedicated_endpoint_hourly
    gpu_type: NVIDIA L4
    gpu_count: 1
    hourly_usd: 0.80
    source: hugging_face_inference_endpoints_pricing

  hf-endpoint-a100-aws-x1:
    basis: dedicated_endpoint_hourly
    gpu_type: NVIDIA A100
    gpu_count: 1
    hourly_usd: 2.50
    source: hugging_face_inference_endpoints_pricing

  hf-endpoint-h100-aws-x1:
    basis: dedicated_endpoint_hourly
    gpu_type: NVIDIA H100
    gpu_count: 1
    hourly_usd: 4.50
    source: hugging_face_inference_endpoints_pricing

  hf-endpoint-h200-aws-x1:
    basis: dedicated_endpoint_hourly
    gpu_type: NVIDIA H200
    gpu_count: 1
    hourly_usd: 5.00
    source: hugging_face_inference_endpoints_pricing

local_hourly_cost_models:
  # Use this for a workshop where every student has different hardware.
  # It prices local inference as if the same work had run on a comparable public GPU.
  market_proxy:
    basis: public_gpu_hourly_proxy
    accelerator_hourly_usd: 0.80
    source_example: hf-endpoint-l4-aws-x1

  # Use this for a laptop or workstation where you know the purchase price.
  # Formula: ((purchase_price * gpu_allocation_ratio) - residual_value) / useful_life_hours
  hardware_amortization:
    basis: owned_hardware_amortization
    purchase_price_usd: 3000
    gpu_allocation_ratio: 0.35
    residual_value_usd: 300
    useful_life_hours: 6000
    derived_accelerator_hourly_usd: 0.125

  # Use this only to demonstrate that electricity alone understates true platform cost.
  energy_only:
    basis: local_power_draw
    power_watts: 65
    electricity_usd_per_kwh: 0.17
    derived_energy_hourly_usd: 0.01105

derived_local_token_rates:
  # Replace these values with output from scripts/benchmark_ollama.py.
  local-ollama-example:
    basis: observed_local_throughput
    model: llama3.2:1b
    cost_model: market_proxy
    input_usd_per_1m_tokens: null
    output_usd_per_1m_tokens: null
    blended_usd_per_1m_tokens: null
    source: local_benchmark

overhead:
  shared_platform_overhead_percent: 15
  include_observability_pipeline: true
  include_vector_database: true
  include_storage_and_network: true
