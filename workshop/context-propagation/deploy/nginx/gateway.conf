# Edge gateway — order traffic only (workshop break #1: no W3C trace headers yet).
# Step 07: edit location /api/ below, then restart the gateway service.
# Catalog traffic: Frontend → frontend-api → catalog-api (bypasses this gateway).
# Order traffic: frontend-api → gateway → order-api

upstream order_api {
    server order-api:3001;
}

server {
    listen 80;
    server_name _;

    location /health {
        return 200 'gateway ok\n';
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_pass http://order_api;
    }
}
