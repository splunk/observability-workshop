apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: cosmic-shop
data:
  default.conf: |
    # Edge gateway — order traffic only (workshop break #1: no W3C trace headers yet).
    # Step 07: edit location /api/ below, then apply this file and restart the gateway deployment.

    upstream order_api {
        server order-api:3001;
    }

    server {
        listen 80;
        server_name _;

        location /health {
            return 200 'gateway ok\n';
            add_header Content-Type text/plain;
        }
        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # W3C Trace Context propagation
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_set_header baggage $http_baggage;

            proxy_http_version 1.1;
            proxy_pass http://order_api;
        }
    }
