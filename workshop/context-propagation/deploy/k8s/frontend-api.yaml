apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-api
  namespace: cosmic-shop
  labels:
    app: frontend-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-api
  template:
    metadata:
      labels:
        app: frontend-api
    spec:
      containers:
        - name: frontend-api
          image: cosmic-shop/frontend-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3007
          envFrom:
            - configMapRef:
                name: otel-config
          env:
            - name: PORT
              value: "3007"
            - name: OTEL_SERVICE_NAME
              value: frontend-api
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://$(NODE_IP):4318
            - name: SPLUNK_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-otel
                  key: accessToken
            - name: SPLUNK_REALM
              valueFrom:
                secretKeyRef:
                  name: splunk-otel
                  key: realm
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "$(OTEL_RESOURCE_ATTRIBUTES),k8s.pod.name=$(K8S_POD_NAME),k8s.namespace.name=$(K8S_NAMESPACE)"
            - name: CATALOG_API_URL
              value: http://catalog-api:3002
            - name: GATEWAY_URL
              value: http://gateway:80
            - name: PAYMENT_GATEWAY_URL
              value: http://payment-gateway:3004
          startupProbe:
            httpGet:
              path: /health
              port: 3007
            failureThreshold: 24
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-api
  namespace: cosmic-shop
spec:
  selector:
    app: frontend-api
  ports:
    - port: 3007
      targetPort: 3007
