apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: cosmic-shop
  labels:
    app: order-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      containers:
        - name: order-api
          image: cosmic-shop/order-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: otel-config
          env:
            - name: PORT
              value: "3001"
            - name: OTEL_SERVICE_NAME
              value: order-api
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://$(NODE_IP):4318
            - name: SPLUNK_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-otel
                  key: accessToken
            - name: SPLUNK_REALM
              valueFrom:
                secretKeyRef:
                  name: splunk-otel
                  key: realm
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "$(OTEL_RESOURCE_ATTRIBUTES),k8s.pod.name=$(K8S_POD_NAME),k8s.namespace.name=$(K8S_NAMESPACE)"
            - name: CATALOG_API_URL
              value: http://catalog-api:3002
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            failureThreshold: 24
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: cosmic-shop
spec:
  selector:
    app: order-api
  ports:
    - port: 3001
      targetPort: 3001
