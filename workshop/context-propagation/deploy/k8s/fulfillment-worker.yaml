apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-worker
  namespace: cosmic-shop
  labels:
    app: fulfillment-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fulfillment-worker
  template:
    metadata:
      labels:
        app: fulfillment-worker
    spec:
      containers:
        - name: fulfillment-worker
          image: cosmic-shop/fulfillment-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3006
          envFrom:
            - configMapRef:
                name: otel-config
          env:
            - name: PORT
              value: "3006"
            - name: OTEL_SERVICE_NAME
              value: fulfillment-worker
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://$(NODE_IP):4318
            - name: SPLUNK_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-otel
                  key: accessToken
            - name: SPLUNK_REALM
              valueFrom:
                secretKeyRef:
                  name: splunk-otel
                  key: realm
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "$(OTEL_RESOURCE_ATTRIBUTES),k8s.pod.name=$(K8S_POD_NAME),k8s.namespace.name=$(K8S_NAMESPACE)"
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
            - name: FULFILLMENT_QUEUE
              value: cosmic-fulfillment
          startupProbe:
            httpGet:
              path: /health
              port: 3006
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fulfillment-worker
  namespace: cosmic-shop
spec:
  selector:
    app: fulfillment-worker
  ports:
    - port: 3006
      targetPort: 3006
