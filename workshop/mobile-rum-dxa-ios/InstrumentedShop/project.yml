name: InstrumentedShop

options:
  xcodeVersion: "15.4"
  postGenCommand: perl -0pi -e 's/objectVersion = 77;/objectVersion = 60;/' InstrumentedShop.xcodeproj/project.pbxproj
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

targets:
  InstrumentedShop:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: InstrumentedShop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.splunk.workshop.InstrumentedShop
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Instrumented Shop
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
      configs:
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

schemes:
  InstrumentedShop:
    build:
      targets:
        InstrumentedShop: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
