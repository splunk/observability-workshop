---
- hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Set the required variables
      set_fact:
        ingest_token: "{{ lookup('env','INGEST_TOKEN') }}"
        api_token: "{{ lookup('env','API_TOKEN') }}"
        rum_token: "{{ lookup('env','RUM_TOKEN') }}"
        realm: "{{ lookup('env','REALM') }}"
        instance: "{{ lookup('env','INSTANCE') }}"
        hec_url: "{{ lookup('env','HEC_URL') }}"
        hec_token: "{{ lookup('env','HEC_TOKEN') }}"

  tasks:
    - name: Configure Demo-in-a-Box
      block:
      - name: Check to see if the config has run
        stat:
          path: /white_rabbit.followed
        register: wh_result

      - name: Extract demo-in-a-box.zip into /home/splunk/
        unarchive:
          src: demo-in-a-box.zip
          dest: /home/splunk/
          owner: splunk
          group: splunk
          remote_src: yes
          list_files: yes
        become: true
        register: diab_dir_name
        when: not wh_result.stat.exists

      #- name: Delete demo-in-a-box.zip
      #  file:
      #    path: /home/splunk/demo-in-a-box.zip
      #    state: absent
      #  become: true
      #  when: not wh_result.stat.exists

      - debug:
          var: diab_dir_name.files[0]
        when: not wh_result.stat.exists

      - name: Create service for Demo-in-a-Box
        file:
          path: /etc/systemd/system/diab.service
          state: touch
        become: true
        when: not wh_result.stat.exists

      - name: Update service for diab.service
        ansible.builtin.blockinfile:
          path: /etc/systemd/system/diab.service
          block: |
            [Unit]
            Description=Demo-in-a-Box Service
            After=network.target
            StartLimitIntervalSec=0
            [Service]
            Type=simple
            Restart=always
            RestartSec=1
            User=splunk
            Environment="KUBECONFIG=/home/splunk/.kube/config"
            WorkingDirectory=/home/splunk/{{ diab_dir_name.files[0] }}v4
            ExecStart=/bin/bash diab.sh start
            [Install]
            WantedBy=multi-user.target
          marker: "## {mark} Added by ansible (configuration Demo-in-a-Box)"
        become: true
        when: not wh_result.stat.exists

      - name: Start the diab.service
        command: systemctl enable --now diab.service
        become: true
        when: not wh_result.stat.exists

      - name: Wait for diab.service to start
        pause:
          seconds: 20
        when: not wh_result.stat.exists

      - name: Enable Chaos Mesh dashboard
        command: kubectl apply -f /home/splunk/{{ diab_dir_name.files[0] }}v4/chaos-mesh/chaos-mesh-dashboard-lb.yaml
        when: not wh_result.stat.exists

      - name: Save Demo-in-a-Box configuration
        uri:
          url: "http://localhost:8082/saveConfig"
          method: POST
          body: "realm={{ realm }}&ingest_token={{ ingest_token }}&api_token={{ api_token }}&rum_token={{ rum_token }}&hec_url={{ hec_url}}&hec_token={{ hec_token }}&splunk_index=splunk4rookies-workshop&instance={{ instance }}"
          status_code: [ 200, 201 ]
          timeout: 30
        register: splunk_api
        until: splunk_api.status == 200
        retries: 10
        delay: 5
        when: not wh_result.stat.exists

      - name: Create a file to signify that the config has run successfully
        file:
          path: "/white_rabbit.followed"
          state: touch
        become: true
        when: not wh_result.stat.exists
