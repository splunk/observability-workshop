###############################################################################
# Application Deployments and Services
#
# These are the same "naked" apps from Phase 1/2 -- no OTel SDKs, no tracing.
# Build images from 02-obi-docker/ and load into your cluster before applying.
###############################################################################

# --- Frontend (Node.js) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: obi-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: obi-workshop-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: ORDER_PROCESSOR_URL
              value: "http://order-processor:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: obi-workshop
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000

---
# --- Order Processor (Go) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processor
  namespace: obi-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-processor
  template:
    metadata:
      labels:
        app: order-processor
    spec:
      containers:
        - name: order-processor
          image: obi-workshop-order-processor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: order-processor
  namespace: obi-workshop
spec:
  selector:
    app: order-processor
  ports:
    - port: 8080
      targetPort: 8080

---
# --- Payment Service (Go) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: obi-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: obi-workshop-payment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: obi-workshop
spec:
  selector:
    app: payment-service
  ports:
    - port: 8081
      targetPort: 8081
