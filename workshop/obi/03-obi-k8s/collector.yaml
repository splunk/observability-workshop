###############################################################################
# Splunk OTel Collector
#
# BEFORE YOU APPLY: Replace the four values in the env section
# with your Splunk credentials and identity.
###############################################################################

apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk-otel-collector
  namespace: obi-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splunk-otel-collector
  template:
    metadata:
      labels:
        app: splunk-otel-collector
    spec:
      containers:
        - name: collector
          image: quay.io/signalfx/splunk-otel-collector:latest
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 13133
          env:
            - name: SPLUNK_INGEST_TOKEN
              value: " "                  # <-- Your Splunk ingest token
            - name: SPLUNK_REALM
              value: " "                  # <-- Your realm (us0, us1, eu0)
            - name: WORKSHOP_HOST_NAME
              value: " "                  # <-- Your name/initials (e.g. jsmith-k8s)
            - name: WORKSHOP_ENVIRONMENT
              value: " "                  # <-- Unique label (e.g. jsmith-k8s-workshop)
            - name: SPLUNK_CONFIG
              value: /etc/otel/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/otel/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: splunk-otel-collector
  namespace: obi-workshop
spec:
  selector:
    app: splunk-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: health
      port: 13133
      targetPort: 13133
