metadata:
  name: payment-va
  labels:
    app: payment
    version: vA
    opentelemetry.io/name: payment-va
spec:
  type: ClusterIP
  selector:
    app: payment
    version: vA
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: grpc

