    opentelemetry.io/name: flagd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagd
  labels:
    opentelemetry.io/name: flagd
    app.kubernetes.io/component: flagd
    app.kubernetes.io/name: flagd
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: flagd
  template:
    metadata:
      labels:
        opentelemetry.io/name: flagd
        app.kubernetes.io/component: flagd
        app.kubernetes.io/name: flagd
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
      - name: flagd
        image: ghcr.io/open-feature/flagd:v0.14.2
        imagePullPolicy: Always
        command:
        - /flagd-build
        - start
        - --port
        - '8013'
        - --ofrep-port
        - '8016'
        - --uri
        - file:./etc/flagd/demo.flagd.json
        ports:
        - containerPort: 8013
          name: rpc
        - containerPort: 8016
          name: ofrep
        env:
        - name: GOMEMLIMIT
          value: 60MiB
        resources:
          limits:
            memory: 75Mi
        volumeMounts:
        - name: config-rw
          mountPath: /etc/flagd
      initContainers:
      - command:
        - sh
        - -c
        - cp /config-ro/demo.flagd.json /config-rw/demo.flagd.json && cat /config-rw/demo.flagd.json
        image: busybox
        name: init-config
        volumeMounts:
        - mountPath: /config-ro
          name: config-ro
        - mountPath: /config-rw
          name: config-rw
      volumes:
      - name: config-rw
        persistentVolumeClaim:
          claimName: flagd-shared-config
      - configMap:
          name: flagd-config
        name: config-ro

---

# === flagd-config ===
# Kubernetes manifest for flagd-config
# NOTE: The ConfigMap is generated at stitch time from src/flagd/demo.flagd.json
# This file only contains the PVC definition
---
# PersistentVolumeClaim for shared flagd configuration
# This PVC is shared between flagd and flagd-ui to enable dynamic flag updates
# Using ReadWriteOnce with podAffinity to ensure both pods on same node
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flagd-shared-config
  labels:
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/component: flagd
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  storageClassName: local-path
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flagd-config
  labels:
    app.kubernetes.io/part-of: opentelemetry-demo
data:
  demo.flagd.json: |
    {
      "$schema": "https://flagd.dev/schema/v0/flags.json",
      "flags": {
        "orderValidationThrottle": {
          "description": "order-validation runs full CPU-bound compliance/audit path, exposing k8s CPU throttle scenario. Off returns precomputed stub.",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "on"
        },
        "llmInaccurateResponse": {
          "defaultVariant": "off",
          "description": "LLM returns an inaccurate product summary for product ID L9ECAV7KIM",
          "state": "ENABLED",
          "variants": {
            "off": false,
            "on": true
          }
        },
        "llmRateLimitError": {
          "defaultVariant": "off",
          "description": "LLM intermittently returns a rate limit error",
          "state": "ENABLED",
          "variants": {
            "off": false,
            "on": true
          }
        },
        "productCatalogFailure": {
          "description": "Fail product catalog service on a specific product",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "off"
        },
        "recommendationCacheFailure": {
          "description": "Fail recommendation service cache",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "off"
        },
        "adManualGc": {
          "description": "Triggers full manual garbage collections in the ad service",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "off"
        },
        "adHighCpu": {
          "description": "Triggers high cpu load in the ad service",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "off"
        },
        "adFailure": {
          "description": "Fail ad service",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "off"
        },
        "kafkaQueueProblems": {
          "description": "Overloads Kafka queue while simultaneously introducing a consumer side delay leading to a lag spike",
          "state": "ENABLED",
          "variants": {
            "on": 100,
            "off": 0
          },
          "defaultVariant": "off"
        },
        "cartFailure": {
          "description": "Fail cart service",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "off"
        },
        "paymentFailure": {
          "description": "Fail payment service charge requests n%",
          "state": "ENABLED",
          "variants": {
            "100%": 1,
            "90%": 0.95,
            "75%": 0.75,
            "50%": 0.5,
            "25%": 0.25,
            "10%": 0.1,
            "off": 0
          },
          "defaultVariant": "50%"
        },
        "rumBlueGreen": {
          "description": "Enable RUM-based payment path (A/B) tracking in user.deployment_type attribute",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "on"
        },
        "paymentUnreachable": {
          "description": "Payment service is unavailable",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "off"
        },
        "loadGeneratorFloodHomepage": {
          "description": "Flood the frontend with a large amount of requests.",
          "state": "ENABLED",
          "variants": {
            "on": 100,
            "off": 0
          },
          "defaultVariant": "off"
        },
        "imageSlowLoad": {
          "description": "slow loading images in the frontend",
          "state": "ENABLED",
          "variants": {
            "10sec": 10000,
            "5sec": 5000,
            "off": 0
          },
          "defaultVariant": "off"
        },
        "failedReadinessProbe": {
          "description": "readiness probe failure for cart service",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "off"
    
        },
        "emailMemoryLeak": {
          "description": "Memory leak in the email service.",
          "state": "ENABLED",
          "variants": {
            "off": 0,
            "1x": 1,
            "10x": 10,
            "100x": 100,
            "1000x": 1000,
            "10000x": 10000
          },
          "defaultVariant": "off"
        },
        "recommendationCartesianQuery": {
          "description": "DBMon Demo: Triggers a Cartesian join query (500M rows) in recommendation service PostgreSQL calls. Query returns correct results but processes 500M intermediate rows, taking 12+ seconds.",
          "state": "ENABLED",
          "variants": {
            "on": true,
            "off": false
          },
          "defaultVariant": "on"
        },
        "secureappAttack": {
          "description": "Controls secureapp loadgen pace. Minimal spreads vuln probes across ~2 days. Max fires all attacks aggressively every few minutes.",
          "state": "ENABLED",
          "variants": {
            "minimal": "minimal",
            "targeted": "targeted",
            "max": "max"
          },
          "defaultVariant": "minimal"
        }
      }
    }

