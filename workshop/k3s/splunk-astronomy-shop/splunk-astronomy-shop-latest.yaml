# Kubernetes manifest for postgres (PostgreSQL database)
# Extracted from opentelemetry-demo.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  labels:
    opentelemetry.io/name: postgresql
    app.kubernetes.io/component: postgresql
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  type: ClusterIP
  ports:
  - port: 5432
    name: tcp-service
    targetPort: 5432
  selector:
    opentelemetry.io/name: postgresql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  labels:
    opentelemetry.io/name: postgresql
    app.kubernetes.io/component: postgresql
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/version: 2.1.3
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: postgresql
  template:
    metadata:
      annotations:
        splunk.com/monitor: postgresql
        splunk.com/postgresql.database: otel
      labels:
        opentelemetry.io/name: postgresql
        app.kubernetes.io/component: postgresql
        app.kubernetes.io/name: postgresql
