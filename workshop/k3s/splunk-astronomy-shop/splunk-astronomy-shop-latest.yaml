---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounting
  labels:
    opentelemetry.io/name: accounting
    app.kubernetes.io/component: accounting
    app.kubernetes.io/name: accounting
    app.kubernetes.io/version: 2.0.6
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: accounting
  template:
    metadata:
      labels:
        opentelemetry.io/name: accounting
        app.kubernetes.io/component: accounting
        app.kubernetes.io/name: accounting
    spec:
      serviceAccountName: opentelemetry-demo
      # DNS Configuration to prevent stale DNS caching
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          # Reduce DNS TTL to 10 seconds for faster updates
          - name: ndots
            value: "2"
          # Number of DNS queries before giving up
          - name: timeout
            value: "2"
          # Number of retries for DNS queries
          - name: attempts
            value: "3"
      containers:
      - name: accounting
        image: ghcr.io/splunk/opentelemetry-demo/otel-accounting:2.0.6
        imagePullPolicy: Always
        env:
        - name: OTEL_SERVICE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['app.kubernetes.io/component']
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_COLLECTOR_NAME
          value: $(NODE_IP)
        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative
        - name: KAFKA_ADDR
          value: kafka:9092
        # Kafka connection retry configuration
        - name: KAFKA_RECONNECT_BACKOFF_MS
          value: "1000"
        - name: KAFKA_RECONNECT_BACKOFF_MAX_MS
          value: "10000"
        - name: KAFKA_CONNECTIONS_MAX_IDLE_MS
          value: "300000"
        - name: KAFKA_METADATA_MAX_AGE_MS
          value: "10000"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://$(OTEL_COLLECTOR_NAME):4318
        - name: DB_CONNECTION_STRING
          value: Host=postgresql;Username=otelu;Password=otelp;Database=otel
        # Optional fire-and-forget call to order-validation (throttle-demo).
        # Safe to leave set even when throttle-demo manifest is not applied:
        # DNS NXDOMAIN / connection refused / timeout all swallowed by
        # TriggerValidation, which also enforces a 120s HttpClient timeout
        # (covers the slowest validation tier).
        # To disable entirely, unset.
        - name: ORDER_VALIDATION_ADDR
          value: http://order-validation:8080
        - name: OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED
          value: 'false'
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=2.0.6,service.kafka=spanlink
        - name: SPLUNK_PROFILER_ENABLED
          value: 'true'
        - name: SPLUNK_PROFILER_MEMORY_ENABLED
          value: 'true'
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
        volumeMounts: null
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;
        image: busybox:latest
        name: wait-for-kafka
      volumes: null

