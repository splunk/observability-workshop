apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-loadgen
  namespace: ai-remediation
  labels:
    app: remediation-loadgen
    app.kubernetes.io/name: remediation-loadgen
    app.kubernetes.io/part-of: ai-troubleshooting-remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remediation-loadgen
  template:
    metadata:
      labels:
        app: remediation-loadgen
        app.kubernetes.io/name: remediation-loadgen
        app.kubernetes.io/part-of: ai-troubleshooting-remediation
    spec:
      containers:
        - name: remediation-loadgen
          image: ai-remediation-app:local
          imagePullPolicy: IfNotPresent
          command:
            - opentelemetry-instrument
            - python
            - loadgen.py
          env:
            - name: TARGET_URL
              value: http://checkout-service:8080/checkout
            - name: REQUEST_INTERVAL_SECONDS
              value: "1.0"
            - name: OTEL_SERVICE_NAME
              value: remediation-loadgen
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=ai-remediation-workshop,service.version=1.0.0,app.workshop=ai-troubleshooting-remediation
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://$(NODE_IP):4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi

