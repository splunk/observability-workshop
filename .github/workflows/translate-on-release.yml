name: Translate Content on Release

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  ANTHROPIC_MODEL: global.anthropic.claude-opus-4-5-20250514-v1:0

jobs:
  detect-changes:
    name: Detect changed English content
    runs-on: ubuntu-24.04
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
      previous_tag: ${{ steps.detect.outputs.previous_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous release tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name }}"
          PREVIOUS_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            echo "No previous tag found, using initial commit"
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
          echo "Previous tag: ${PREVIOUS_TAG}"

      - name: Detect changed English files
        id: detect
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name }}"
          PREVIOUS_TAG="${{ steps.prev-tag.outputs.previous_tag }}"

          echo "Comparing ${PREVIOUS_TAG}..${CURRENT_TAG}"

          # Get changed markdown files in content/en/
          CHANGED_FILES=$(git diff --name-only "${PREVIOUS_TAG}..${CURRENT_TAG}" -- 'content/en/**/*.md' | sort)

          if [ -z "$CHANGED_FILES" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No English content changes detected"
            exit 0
          fi

          # Filter to only files that need translation
          TRANSLATION_TARGETS=""
          for file in $CHANGED_FILES; do
            # Skip if file no longer exists (deleted)
            if [ ! -f "$file" ]; then
              continue
            fi

            # Convert en path to ja path
            JA_FILE="${file/content\/en/content\/ja}"

            # Check if translation exists and if source is newer
            if [ -f "$JA_FILE" ]; then
              # File exists - check if source was modified (needs re-translation)
              EN_MODIFIED=$(git log -1 --format="%ct" "${CURRENT_TAG}" -- "$file" 2>/dev/null || echo "0")
              JA_MODIFIED=$(git log -1 --format="%ct" "${CURRENT_TAG}" -- "$JA_FILE" 2>/dev/null || echo "0")

              if [ "$EN_MODIFIED" -gt "$JA_MODIFIED" ]; then
                TRANSLATION_TARGETS="${TRANSLATION_TARGETS}${file}"$'\n'
              fi
            else
              # New file - needs translation
              TRANSLATION_TARGETS="${TRANSLATION_TARGETS}${file}"$'\n'
            fi
          done

          if [ -z "$TRANSLATION_TARGETS" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "All changed files already have up-to-date translations"
            exit 0
          fi

          # Encode file list for output (newline-separated to JSON array)
          CHANGED_JSON=$(echo "$TRANSLATION_TARGETS" | grep -v '^$' | jq -R . | jq -s .)

          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "changed_files=${CHANGED_JSON}" >> $GITHUB_OUTPUT
          echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT

          echo "Files to translate:"
          echo "$TRANSLATION_TARGETS"

  translate:
    name: Translate content
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-translation

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Create translation branch
        id: branch
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          BRANCH_NAME="auto-translate/${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH_NAME}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Translate files
        id: translate
        env:
          CHANGED_FILES: ${{ needs.detect-changes.outputs.changed_files }}
          CLAUDE_CODE_USE_BEDROCK: "1"
        run: |
          # Parse the JSON array of files
          FILES=$(echo "$CHANGED_FILES" | jq -r '.[]')

          TRANSLATED_COUNT=0
          FAILED_COUNT=0
          FAILED_FILES=""

          for EN_FILE in $FILES; do
            echo "========================================"
            echo "Translating: ${EN_FILE}"
            echo "========================================"

            # Calculate target path
            JA_FILE="${EN_FILE/content\/en/content\/ja}"
            JA_DIR=$(dirname "$JA_FILE")

            # Create target directory if it doesn't exist
            mkdir -p "$JA_DIR"

            # Copy the English file to Japanese location first
            cp "$EN_FILE" "$JA_FILE"

            # Copy associated images if this is the first file in a directory
            EN_DIR=$(dirname "$EN_FILE")
            if [ -d "${EN_DIR}/img" ] && [ ! -d "${JA_DIR}/img" ]; then
              cp -r "${EN_DIR}/img" "${JA_DIR}/"
            fi

            # Invoke Claude Code to translate the file
            if claude --print \
              "Translate the file at ${JA_FILE} from English to Japanese following the /splunk-workshop-ja-translator skill guidelines. The source English file is ${EN_FILE}. Translate in place, overwriting the current content of ${JA_FILE}. Do not translate code blocks, CLI commands, file paths, URLs, or product names. Use です/ます form. Ensure Markdown formatting is preserved." \
              --allowedTools "Edit,Read,Write" \
              --max-turns 10 \
              2>&1; then

              echo "Successfully translated: ${EN_FILE}"
              TRANSLATED_COUNT=$((TRANSLATED_COUNT + 1))
            else
              echo "Failed to translate: ${EN_FILE}"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              FAILED_FILES="${FAILED_FILES}\n- ${EN_FILE}"
            fi

            # Add a small delay to avoid rate limiting
            sleep 2
          done

          echo "translated_count=${TRANSLATED_COUNT}" >> $GITHUB_OUTPUT
          echo "failed_count=${FAILED_COUNT}" >> $GITHUB_OUTPUT
          echo "failed_files=${FAILED_FILES}" >> $GITHUB_OUTPUT

      - name: Commit translations
        id: commit
        run: |
          git add content/ja/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_commits=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "Add Japanese translations for ${{ github.event.release.tag_name }}

          Automatically translated using Claude Code with Bedrock backend.

          Translated files: ${{ steps.translate.outputs.translated_count }}
          Failed files: ${{ steps.translate.outputs.failed_count }}

          Generated with Claude Code"

          echo "has_commits=true" >> $GITHUB_OUTPUT

      - name: Push branch
        if: steps.commit.outputs.has_commits == 'true'
        run: |
          git push -u origin "${{ steps.branch.outputs.branch_name }}"

      - name: Create Pull Request
        if: steps.commit.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          TRANSLATED_COUNT="${{ steps.translate.outputs.translated_count }}"
          FAILED_COUNT="${{ steps.translate.outputs.failed_count }}"
          FAILED_FILES="${{ steps.translate.outputs.failed_files }}"

          # Build PR body
          PR_BODY="## Summary

          Automatic Japanese translations for release ${VERSION}.

          - **Translated files**: ${TRANSLATED_COUNT}
          - **Failed files**: ${FAILED_COUNT}
          "

          if [ "$FAILED_COUNT" != "0" ]; then
            PR_BODY="${PR_BODY}
          ### Failed Translations

          The following files could not be translated and may need manual attention:
          ${FAILED_FILES}
          "
          fi

          PR_BODY="${PR_BODY}
          ## Review Checklist

          - [ ] Markdown renders correctly
          - [ ] All links work
          - [ ] Code blocks unchanged
          - [ ] Terminology is consistent
          - [ ] Bold markup displays correctly

          ## Test Plan

          - [ ] Run \`hugo serve\` locally and verify Japanese pages render correctly
          - [ ] Check that images are displayed
          - [ ] Verify navigation works

          Generated with [Claude Code](https://claude.ai/claude-code)"

          gh pr create \
            --title "Japanese translations for ${VERSION}" \
            --body "$PR_BODY" \
            --base main \
            --head "${{ steps.branch.outputs.branch_name }}" \
            --label "translation,automated"
