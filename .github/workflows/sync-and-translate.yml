name: Sync Upstream and Translate on New Release

on:
  schedule:
    # Run every Monday at 9:00 AM JST (00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force translation even if no new tags'
        required: false
        type: boolean
        default: false
      translate_all_untranslated:
        description: 'Also translate all untranslated content'
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-and-translate
  cancel-in-progress: false

permissions: {}

env:
  AWS_REGION: us-west-2
  ANTHROPIC_MODEL: global.anthropic.claude-opus-4-5-20251101-v1:0
  UPSTREAM_REPO: splunk/observability-workshop
  UPSTREAM_BRANCH: main
  FORK_REPO: ${{ github.repository }}
  LAST_TAG_FILE: .last-translated-tag

jobs:
  check-new-release:
    name: Check for new upstream release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      has_new_release: ${{ steps.check.outputs.has_new_release }}
      new_tag: ${{ steps.check.outputs.new_tag }}
      last_tag: ${{ steps.check.outputs.last_tag }}
    steps:
      - name: Checkout translation system branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream --tags

      - name: Check for new release tags
        id: check
        env:
          FORCE_TRANSLATE: ${{ inputs.force_translate }}
        run: |
          # Get the latest release tag from upstream (semantic versioning)
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No release tags found in upstream"
            echo "has_new_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Latest upstream tag: ${LATEST_TAG}"

          # Get the last translated tag from our tracking file
          LAST_TAG=""
          if [ -f "${{ env.LAST_TAG_FILE }}" ]; then
            LAST_TAG=$(cat "${{ env.LAST_TAG_FILE }}")
            echo "Last translated tag: ${LAST_TAG}"
          else
            echo "No previous translation record found"
          fi

          # Check if force translate is enabled
          if [ "$FORCE_TRANSLATE" = "true" ]; then
            echo "Force translate enabled"
            echo "has_new_release=true" >> $GITHUB_OUTPUT
            echo "new_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
            echo "last_tag=${LAST_TAG}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Compare tags
          if [ "$LATEST_TAG" = "$LAST_TAG" ]; then
            echo "No new release to translate"
            echo "has_new_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "New release detected: ${LATEST_TAG}"
          echo "has_new_release=true" >> $GITHUB_OUTPUT
          echo "new_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "last_tag=${LAST_TAG}" >> $GITHUB_OUTPUT

  sync-and-translate:
    name: Sync main and translate
    needs: check-new-release
    if: needs.check-new-release.outputs.has_new_release == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      id-token: write
      contents: write
    outputs:
      translation_branch: ${{ steps.translate-branch.outputs.branch_name }}
      translated_count: ${{ steps.translate.outputs.translated_count }}
      failed_count: ${{ steps.translate.outputs.failed_count }}
      has_new_workshops: ${{ steps.detect-new-workshops.outputs.has_new_workshops }}
      new_workshops: ${{ steps.detect-new-workshops.outputs.new_workshops }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Setup upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream --tags ${{ env.UPSTREAM_BRANCH }}

      - name: Sync main with upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_TAG="${{ needs.check-new-release.outputs.new_tag }}"

          # Reset main to upstream tag
          git reset --hard "${NEW_TAG}"

          # Push synced main
          git push origin main --force

      - name: Detect files to translate
        id: detect
        env:
          TRANSLATE_ALL: ${{ inputs.translate_all_untranslated }}
        run: |
          NEW_TAG="${{ needs.check-new-release.outputs.new_tag }}"
          LAST_TAG="${{ needs.check-new-release.outputs.last_tag }}"

          # Determine comparison base
          if [ -n "$LAST_TAG" ]; then
            COMPARE_BASE="${LAST_TAG}"
          else
            # First run: translate all existing English content
            COMPARE_BASE=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Comparing ${COMPARE_BASE}..${NEW_TAG}"

          # Get changed English markdown files
          CHANGED_FILES=$(git diff --name-only "${COMPARE_BASE}..${NEW_TAG}" -- ':(glob)content/en/**/*.md' 2>/dev/null | sort || true)

          # Filter files that need translation
          TRANSLATION_TARGETS=""
          for file in $CHANGED_FILES; do
            if [ ! -f "$file" ]; then
              continue
            fi
            TRANSLATION_TARGETS="${TRANSLATION_TARGETS}${file}"$'\n'
          done

          # Find all untranslated files if requested
          UNTRANSLATED_FILES=""
          if [ "$TRANSLATE_ALL" = "true" ]; then
            echo "Scanning for all untranslated files..."

            for en_file in $(find content/en -name "*.md" -type f 2>/dev/null | sort); do
              ja_file="${en_file/content\/en/content\/ja}"

              if [ ! -f "$ja_file" ]; then
                UNTRANSLATED_FILES="${UNTRANSLATED_FILES}${en_file}"$'\n'
              fi
            done
          fi

          # Combine files
          ALL_FILES="${TRANSLATION_TARGETS}${UNTRANSLATED_FILES}"

          if [ -z "$ALL_FILES" ] || [ "$ALL_FILES" = $'\n' ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "No files need translation"
            exit 0
          fi

          # Write file list to a temporary file (avoids GITHUB_OUTPUT size limits)
          echo "$ALL_FILES" | grep -v '^$' > /tmp/files_to_translate.txt
          FILE_COUNT=$(wc -l < /tmp/files_to_translate.txt)

          echo "has_files=true" >> $GITHUB_OUTPUT
          echo "file_count=${FILE_COUNT}" >> $GITHUB_OUTPUT

          echo "Files to translate (${FILE_COUNT} files):"
          cat /tmp/files_to_translate.txt

      - name: Detect new workshops
        id: detect-new-workshops
        if: steps.detect.outputs.has_files == 'true'
        run: |
          LAST_TAG="${{ needs.check-new-release.outputs.last_tag }}"

          # If no previous tag (first run), skip detection - no baseline to compare
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag - skipping new workshop detection"
            # NOTE: "yes"/"no" instead of "true"/"false" is a workaround for a Slack Workflow Builder bug
            # where string literals "true"/"false" cause branch condition evaluation errors.
            echo "has_new_workshops=no" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMPARE_BASE="${LAST_TAG}"

          # Extract workshop-level directories from translation targets
          # Pattern: content/en/{category}/{workshop-name}/...
          # Workshop level = first 4 path components (depth 4)
          NEW_WORKSHOPS=""
          CHECKED_DIRS=""

          while IFS= read -r file; do
            # Extract workshop-level directory (first 4 path components)
            # Files with fewer than 5 components (e.g. category _index.md) are skipped
            WORKSHOP_DIR=$(echo "$file" | awk -F'/' 'NF>=5{print $1"/"$2"/"$3"/"$4}')

            if [ -z "$WORKSHOP_DIR" ]; then
              continue
            fi

            # Skip images/img directories
            DIRNAME=$(basename "$WORKSHOP_DIR")
            if [ "$DIRNAME" = "images" ] || [ "$DIRNAME" = "img" ]; then
              continue
            fi

            # Skip if already checked
            if echo "$CHECKED_DIRS" | grep -qF "$WORKSHOP_DIR"; then
              continue
            fi
            CHECKED_DIRS="${CHECKED_DIRS}${WORKSHOP_DIR}"$'\n'

            # Check if this workshop directory existed in the previous tag
            if ! git rev-parse --verify "${COMPARE_BASE}:${WORKSHOP_DIR}" >/dev/null 2>&1; then
              # New directory: check if _index.md has draft: true or hidden: true
              # Workshop development starts with draft: true and is released when draft is removed/set to false
              INDEX_FILE="${WORKSHOP_DIR}/_index.md"
              IS_DRAFT=""
              if [ -f "$INDEX_FILE" ]; then
                IS_DRAFT=$(awk '/^---/{c++; if(c==2) exit} c==1 && /^(draft|hidden):[[:space:]]*true/' "$INDEX_FILE")
              fi
              if [ -n "$IS_DRAFT" ]; then
                echo "Skipping draft/hidden workshop: ${WORKSHOP_DIR}"
              else
                echo "New released workshop detected: ${WORKSHOP_DIR}"
                NEW_WORKSHOPS="${NEW_WORKSHOPS}${WORKSHOP_DIR}"$'\n'
              fi
            fi
          done < /tmp/files_to_translate.txt

          # Detect workshops that changed from draft: true to released (draft removed or set to false)
          # This covers the case where a workshop existed before but was in draft state
          while IFS= read -r index_file; do
            if [ -z "$index_file" ]; then continue; fi
            WORKSHOP_DIR=$(echo "$index_file" | awk -F'/' 'NF==5{print $1"/"$2"/"$3"/"$4}')
            if [ -z "$WORKSHOP_DIR" ]; then continue; fi
            # Skip if already recorded
            if echo "$CHECKED_DIRS" | grep -qF "$WORKSHOP_DIR"; then continue; fi
            # Skip if this is a new directory (handled above as case 1)
            if ! git rev-parse --verify "${COMPARE_BASE}:${index_file}" >/dev/null 2>&1; then continue; fi
            # Check if draft: true or hidden: true existed in previous tag
            OLD_CONTENT=$(git show "${COMPARE_BASE}:${index_file}" 2>/dev/null || echo "")
            WAS_DRAFT=$(echo "$OLD_CONTENT" | awk '/^---/{c++; if(c==2) exit} c==1 && /^(draft|hidden):[[:space:]]*true/')
            if [ -z "$WAS_DRAFT" ]; then continue; fi
            # Check if it is still in draft state now
            IS_DRAFT=$(awk '/^---/{c++; if(c==2) exit} c==1 && /^(draft|hidden):[[:space:]]*true/' "$index_file" 2>/dev/null || echo "")
            if [ -z "$IS_DRAFT" ]; then
              echo "Newly released workshop (draft removed): ${WORKSHOP_DIR}"
              NEW_WORKSHOPS="${NEW_WORKSHOPS}${WORKSHOP_DIR}"$'\n'
              CHECKED_DIRS="${CHECKED_DIRS}${WORKSHOP_DIR}"$'\n'
            fi
          done < <(git diff "${COMPARE_BASE}..HEAD" --name-only -- "content/en/*/*/_index.md" 2>/dev/null || true)

          if [ -n "$NEW_WORKSHOPS" ]; then
            echo "has_new_workshops=yes" >> $GITHUB_OUTPUT
            echo "new_workshops<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_WORKSHOPS" | grep -v '^$' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            WORKSHOP_COUNT=$(echo "$NEW_WORKSHOPS" | grep -v '^$' | wc -l)
            echo "Detected ${WORKSHOP_COUNT} new workshop(s)"
          else
            echo "has_new_workshops=no" >> $GITHUB_OUTPUT
            echo "No new workshops detected"
          fi

      - name: Configure AWS credentials via OIDC
        if: steps.detect.outputs.has_files == 'true'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-translation

      - name: Setup Node.js
        if: steps.detect.outputs.has_files == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        if: steps.detect.outputs.has_files == 'true'
        run: npm install -g @anthropic-ai/claude-code@2

      - name: Setup translation tools
        if: steps.detect.outputs.has_files == 'true'
        run: |
          git fetch origin ja-translation-system
          git show origin/ja-translation-system:package.json > package.json
          git show origin/ja-translation-system:package-lock.json > package-lock.json
          git show origin/ja-translation-system:.textlintrc > .textlintrc
          git show origin/ja-translation-system:.markdownlint.json > .markdownlint.json
          mkdir -p .claude/skills/splunk-workshop-ja-translator/textlint-rules
          git show origin/ja-translation-system:.claude/skills/splunk-workshop-ja-translator/textlint-rules/no-ja-trailing-colon.js \
            > .claude/skills/splunk-workshop-ja-translator/textlint-rules/no-ja-trailing-colon.js
          npm ci

      - name: Create translation branch
        id: translate-branch
        if: steps.detect.outputs.has_files == 'true'
        run: |
          NEW_TAG="${{ needs.check-new-release.outputs.new_tag }}"
          BRANCH_NAME="translate/${NEW_TAG}"

          # -B = 既存ブランチがあれば現在コミットにリセット、なければ新規作成（冪等）
          git checkout -B "${BRANCH_NAME}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Translate files
        id: translate
        if: steps.detect.outputs.has_files == 'true'
        timeout-minutes: 60
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
        run: |
          # Configuration
          PARALLEL_JOBS=4
          FILE_TIMEOUT=300  # 5 minutes per file
          MAX_RETRIES=3

          # Create result directories
          mkdir -p /tmp/translate_results

          # Define translation function
          translate_file() {
            local EN_FILE="$1"
            local FILE_TIMEOUT="$2"
            local MAX_RETRIES="$3"
            local RESULT_DIR="/tmp/translate_results"

            if [ -z "$EN_FILE" ]; then
              return 0
            fi

            # Create unique result file based on input path
            local RESULT_FILE="${RESULT_DIR}/$(echo "$EN_FILE" | md5sum | cut -d' ' -f1)"

            echo "========================================"
            echo "Translating: ${EN_FILE}"
            echo "========================================"

            # Calculate target path
            local JA_FILE="${EN_FILE/content\/en/content\/ja}"
            local JA_DIR=$(dirname "$JA_FILE")

            # Create target directory
            mkdir -p "$JA_DIR"

            # Copy the English file to Japanese location first
            cp "$EN_FILE" "$JA_FILE"

            # Copy associated images
            local EN_DIR=$(dirname "$EN_FILE")
            if [ -d "${EN_DIR}/img" ] && [ ! -d "${JA_DIR}/img" ]; then
              echo "Copying images from ${EN_DIR}/img to ${JA_DIR}/img"
              cp -r "${EN_DIR}/img" "${JA_DIR}/"
            fi

            # Invoke Claude Code to translate with retry logic
            local RETRY_COUNT=0
            local TRANSLATE_SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$TRANSLATE_SUCCESS" = "false" ]; do
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Translation attempt ${RETRY_COUNT}/${MAX_RETRIES} for ${EN_FILE}..."

              if timeout "${FILE_TIMEOUT}" claude --print \
                "Translate the file at ${JA_FILE} from English to Japanese following the /splunk-workshop-ja-translator skill guidelines. The source English file is ${EN_FILE}. Translate in place, overwriting the current content of ${JA_FILE}. Do not translate code blocks, CLI commands, file paths, URLs, or product names. Use です/ます form. Ensure Markdown formatting is preserved." \
                --allowedTools "Edit,Read,Write" \
                --max-turns 10 \
                2>&1; then
                TRANSLATE_SUCCESS=true
                echo "Successfully translated: ${EN_FILE}"
              else
                local EXIT_CODE=$?
                if [ $EXIT_CODE -eq 124 ]; then
                  echo "TIMEOUT: Translation timed out after ${FILE_TIMEOUT}s for: ${EN_FILE}"
                else
                  echo "Attempt ${RETRY_COUNT} failed for: ${EN_FILE} (exit code: ${EXIT_CODE})"
                fi
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Retrying in 10 seconds..."
                  sleep 10
                fi
              fi
            done

            if [ "$TRANSLATE_SUCCESS" = "true" ]; then
              echo "success:${EN_FILE}" > "$RESULT_FILE"
            else
              echo "ERROR: All ${MAX_RETRIES} attempts failed for: ${EN_FILE}"
              # Remove the untranslated file to avoid committing English content
              rm -f "$JA_FILE"
              echo "failed:${EN_FILE}" > "$RESULT_FILE"
            fi
          }

          # Export function and variables for parallel execution
          export -f translate_file
          export CLAUDE_CODE_USE_BEDROCK

          # Run translations in parallel
          echo "Starting parallel translation with ${PARALLEL_JOBS} jobs..."
          cat /tmp/files_to_translate.txt | \
            xargs -P "${PARALLEL_JOBS}" -I {} bash -c 'translate_file "$1" "$2" "$3"' _ {} "${FILE_TIMEOUT}" "${MAX_RETRIES}"

          # Aggregate results
          TRANSLATED_COUNT=0
          FAILED_COUNT=0
          FAILED_FILES=""

          for result_file in /tmp/translate_results/*; do
            if [ -f "$result_file" ]; then
              content=$(cat "$result_file")
              if [[ "$content" == success:* ]]; then
                TRANSLATED_COUNT=$((TRANSLATED_COUNT + 1))
              elif [[ "$content" == failed:* ]]; then
                FAILED_COUNT=$((FAILED_COUNT + 1))
                file_path="${content#failed:}"
                FAILED_FILES="${FAILED_FILES}\n- ${file_path}"
              fi
            fi
          done

          echo "Translation complete: ${TRANSLATED_COUNT} succeeded, ${FAILED_COUNT} failed"

          echo "translated_count=${TRANSLATED_COUNT}" >> $GITHUB_OUTPUT
          echo "failed_count=${FAILED_COUNT}" >> $GITHUB_OUTPUT
          echo "failed_files<<EOF" >> $GITHUB_OUTPUT
          echo -e "${FAILED_FILES}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check translation coverage
        id: coverage-check
        if: steps.detect.outputs.has_files == 'true'
        run: |
          UNTRANSLATED_COUNT=0

          while IFS= read -r EN_FILE; do
            if [ -z "$EN_FILE" ]; then continue; fi
            file="${EN_FILE/content\/en/content\/ja}"
            if [ ! -f "$file" ]; then continue; fi
            LINE_COUNT=$(wc -l < "$file")
            if [ "$LINE_COUNT" -lt 5 ]; then continue; fi
            if ! grep -Pq '[\x{3040}-\x{309F}\x{30A0}-\x{30FF}]' "$file"; then
              echo "$EN_FILE" >> /tmp/untranslated_files.txt
              UNTRANSLATED_COUNT=$((UNTRANSLATED_COUNT + 1))
              echo "Untranslated: ${file#content/ja/}"
            fi
          done < /tmp/files_to_translate.txt

          echo "untranslated_count=${UNTRANSLATED_COUNT}" >> $GITHUB_OUTPUT

          if [ "$UNTRANSLATED_COUNT" -gt 0 ]; then
            echo "::warning::${UNTRANSLATED_COUNT} untranslated files detected, will retry translation"
          else
            echo "All files translated successfully"
          fi

      - name: Re-translate untranslated files
        if: steps.detect.outputs.has_files == 'true' && steps.coverage-check.outputs.untranslated_count != '0'
        timeout-minutes: 30
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
        run: |
          FILE_TIMEOUT=300
          RETRANSLATED=0
          STILL_FAILED=0

          while IFS= read -r EN_FILE; do
            if [ -z "$EN_FILE" ] || [ ! -f "$EN_FILE" ]; then
              continue
            fi

            JA_FILE="${EN_FILE/content\/en/content\/ja}"
            echo "========================================"
            echo "Re-translating: ${EN_FILE}"
            echo "========================================"

            # Re-copy English source to ensure clean state
            cp "$EN_FILE" "$JA_FILE"

            # Retry translation (1 attempt)
            if timeout "${FILE_TIMEOUT}" claude --print \
              "Translate the file at ${JA_FILE} from English to Japanese following the /splunk-workshop-ja-translator skill guidelines. The source English file is ${EN_FILE}. Translate in place, overwriting the current content of ${JA_FILE}. Do not translate code blocks, CLI commands, file paths, URLs, or product names. Use です/ます form. Ensure Markdown formatting is preserved." \
              --allowedTools "Edit,Read,Write" \
              --max-turns 10 \
              2>&1; then
              echo "Re-translation completed: ${EN_FILE}"
            else
              echo "Re-translation failed: ${EN_FILE} (exit code: $?)"
            fi

            # Final check: remove if still untranslated
            if [ -f "$JA_FILE" ]; then
              LINE_COUNT=$(wc -l < "$JA_FILE")
              if [ "$LINE_COUNT" -ge 5 ] && ! grep -Pq '[\x{3040}-\x{309F}\x{30A0}-\x{30FF}]' "$JA_FILE"; then
                echo "Still untranslated after retry, removing: ${JA_FILE}"
                rm -f "$JA_FILE"
                STILL_FAILED=$((STILL_FAILED + 1))
              else
                RETRANSLATED=$((RETRANSLATED + 1))
              fi
            fi
          done < /tmp/untranslated_files.txt

          echo "Re-translation complete: ${RETRANSLATED} succeeded, ${STILL_FAILED} still failed"

      - name: Lint translated files
        if: steps.detect.outputs.has_files == 'true'
        run: |
          LINT_COUNT=0

          while IFS= read -r EN_FILE; do
            if [ -z "$EN_FILE" ]; then continue; fi
            file="${EN_FILE/content\/en/content\/ja}"
            if [ ! -f "$file" ]; then continue; fi
            npx markdownlint-cli --fix "$file" 2>/dev/null || true
            npx textlint -c .textlintrc \
              --rulesdir .claude/skills/splunk-workshop-ja-translator/textlint-rules \
              --fix "$file" 2>/dev/null || true
            LINT_COUNT=$((LINT_COUNT + 1))
          done < /tmp/files_to_translate.txt

          echo "Linted ${LINT_COUNT} files"

      - name: Commit translations
        id: commit
        if: steps.detect.outputs.has_files == 'true'
        run: |
          # Only add content/ja/ directory
          git add content/ja/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_commits=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_TAG="${{ needs.check-new-release.outputs.new_tag }}"
          TRANSLATED_COUNT="${{ steps.translate.outputs.translated_count }}"
          FAILED_COUNT="${{ steps.translate.outputs.failed_count }}"

          printf '%s\n\n%s\n\n%s\n%s\n\n%s\n' \
            "Add Japanese translations for ${NEW_TAG}" \
            "Automatically translated using Claude Code with AWS Bedrock." \
            "- Translated files: ${TRANSLATED_COUNT}" \
            "- Failed files: ${FAILED_COUNT}" \
            "Generated by GitHub Actions" > /tmp/commit_msg.txt

          git commit -F /tmp/commit_msg.txt
          echo "has_commits=true" >> $GITHUB_OUTPUT

      - name: Push translation branch
        if: steps.commit.outputs.has_commits == 'true'
        run: |
          BRANCH="${{ steps.translate-branch.outputs.branch_name }}"
          # Force push if branch already exists (from previous failed run)
          git push -u origin "${BRANCH}" --force

  create-pr:
    name: Create PR for review
    needs: [check-new-release, sync-and-translate]
    if: needs.sync-and-translate.outputs.translation_branch != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    outputs:
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
    steps:
      - name: Checkout translation branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.sync-and-translate.outputs.translation_branch }}
          fetch-depth: 1

      - name: Create Pull Request to upstream
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT }}
        run: |
          NEW_TAG="${{ needs.check-new-release.outputs.new_tag }}"
          TRANSLATED_COUNT="${{ needs.sync-and-translate.outputs.translated_count }}"
          FAILED_COUNT="${{ needs.sync-and-translate.outputs.failed_count }}"
          HAS_NEW_WORKSHOPS="${{ needs.sync-and-translate.outputs.has_new_workshops }}"
          NEW_WORKSHOPS="${{ needs.sync-and-translate.outputs.new_workshops }}"

          # Build PR body
          {
            printf '%s\n' \
              "## Summary" \
              "" \
              "Japanese translations for release ${NEW_TAG}." \
              "" \
              "- **Translated files**: ${TRANSLATED_COUNT}" \
              "- **Failed files**: ${FAILED_COUNT}"

            # Add new workshops section if detected
            if [ "$HAS_NEW_WORKSHOPS" = "yes" ]; then
              printf '\n%s\n' \
                "## :warning: New Workshops Detected" \
                "" \
                "The following new workshops were detected and require careful review:" \
                ""
              echo "$NEW_WORKSHOPS" | while IFS= read -r workshop; do
                if [ -n "$workshop" ]; then
                  WORKSHOP_NAME=$(basename "$workshop")
                  printf '%s\n' "- \`${workshop}\` (**${WORKSHOP_NAME}**)"
                fi
              done
              printf '\n%s\n' \
                "> This PR was created as a **draft** because new workshops were detected." \
                "> Please review the new workshop translations carefully before marking as ready."
            fi

            printf '\n%s\n' \
              "" \
              "This PR adds Japanese translations for the workshop content." \
              "" \
              "## Review Checklist" \
              "" \
              "- [ ] Markdown renders correctly" \
              "- [ ] All links work" \
              "- [ ] Code blocks unchanged" \
              "- [ ] Terminology is consistent" \
              "" \
              "## Test Plan" \
              "" \
              "- [ ] Run \`hugo serve\` locally and verify Japanese pages render correctly" \
              "- [ ] Check that images are displayed" \
              "- [ ] Verify navigation works" \
              "" \
              "---" \
              "Generated with [Claude Code](https://claude.ai/claude-code) via automated translation workflow."
          } > /tmp/pr_body.md

          TRANSLATION_BRANCH="${{ needs.sync-and-translate.outputs.translation_branch }}"
          FORK_REPO="${{ github.repository }}"
          FORK_OWNER="${{ github.repository_owner }}"

          # 同一ブランチの既存 PR を確認（再実行時の冪等性）
          EXISTING_PR=$(gh pr list \
            --repo "${{ env.UPSTREAM_REPO }}" \
            --head "${FORK_OWNER}:${TRANSLATION_BRANCH}" \
            --state open \
            --json number,url \
            --jq '.[0]' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number')
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.url')
            echo "PR already exists: ${PR_URL} (skipping creation)"
          else
            # Create PR to upstream repository
            DRAFT_ARGS=()
            if [ "$HAS_NEW_WORKSHOPS" = "yes" ]; then
              DRAFT_ARGS=(--draft)
              echo "Creating DRAFT PR (new workshops detected)"
            else
              echo "Creating regular PR"
            fi

            PR_URL=$(gh pr create \
              --repo "${{ env.UPSTREAM_REPO }}" \
              --title "Japanese Translation: ${NEW_TAG}" \
              --body-file /tmp/pr_body.md \
              --base main \
              --head "${FORK_OWNER}:${TRANSLATION_BRANCH}" \
              "${DRAFT_ARGS[@]}") || {
              echo "::error::upstream PR creation failed. Manual steps to create PR:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "1. Ensure UPSTREAM_PAT secret is valid (expiry <= 90 days for Splunk enterprise)"
              echo "   Regenerate at: https://github.com/settings/tokens"
              echo "   Required permission: splunk/observability-workshop > Pull requests: Read and write"
              echo ""
              echo "2. Once PAT is updated, create the PR manually:"
              echo "   gh pr create \\"
              echo "     --repo ${{ env.UPSTREAM_REPO }} \\"
              echo "     --title \"Japanese Translation: ${NEW_TAG}\" \\"
              echo "     --base main \\"
              echo "     --head ${FORK_OWNER}:${TRANSLATION_BRANCH}"
              echo ""
              echo "   Or via GitHub web UI:"
              echo "   https://github.com/${FORK_REPO}/tree/${TRANSLATION_BRANCH}"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 1
            }

            echo "Created PR: ${PR_URL}"
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          fi
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

  update-tag-tracking:
    name: Update last translated tag
    needs: [check-new-release, create-pr]
    if: needs.create-pr.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout translation system branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}

      - name: Update last translated tag file
        run: |
          NEW_TAG="${{ needs.check-new-release.outputs.new_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "${NEW_TAG}" > "${{ env.LAST_TAG_FILE }}"
          git add "${{ env.LAST_TAG_FILE }}"
          git commit -m "Update last translated tag to ${NEW_TAG}"
          git push

  notify-slack:
    name: Notify Slack
    needs: [check-new-release, sync-and-translate, create-pr]
    if: >-
      always()
      && needs.check-new-release.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Determine workflow status
        id: status
        run: |
          if [ "${{ needs.check-new-release.result }}" = "failure" ] || \
             [ "${{ needs.sync-and-translate.result }}" = "failure" ] || \
             [ "${{ needs.create-pr.result }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

      - name: Determine notification reason
        id: reason
        run: |
          HAS_NEW_RELEASE="${{ needs.check-new-release.outputs.has_new_release }}"
          TRANSLATED_COUNT="${{ needs.sync-and-translate.outputs.translated_count }}"

          if [ "$HAS_NEW_RELEASE" != "true" ]; then
            echo "result=no_new_release" >> $GITHUB_OUTPUT
          elif [ -z "$TRANSLATED_COUNT" ] || [ "$TRANSLATED_COUNT" = "0" ]; then
            echo "result=no_translation_targets" >> $GITHUB_OUTPUT
          else
            echo "result=translated" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        run: |
          # NOTE: hasNewWorkshopTranslation uses "yes"/"no" instead of "true"/"false".
          # Slack Workflow Builder has a bug where the string "true" causes branch condition
          # evaluation errors even when the field type is text. Verified 2026-03-30.
          HAS_NEW_WORKSHOP="${{ needs.sync-and-translate.outputs.has_new_workshops }}"
          HAS_NEW_WORKSHOP="${HAS_NEW_WORKSHOP:-no}"
          TRANSLATED_COUNT="${{ needs.sync-and-translate.outputs.translated_count }}"
          FAILED_COUNT="${{ needs.sync-and-translate.outputs.failed_count }}"
          PR_NUMBER="${{ needs.create-pr.outputs.pr_number }}"
          JSON_PAYLOAD=$(cat <<EOF
          {
            "hasNewWorkshopTranslation": "${HAS_NEW_WORKSHOP}",
            "translatedMarkdownFileCount": "${TRANSLATED_COUNT:-0}",
            "failedFileCount": "${FAILED_COUNT:-0}",
            "pullRequestNumber": "${PR_NUMBER:-}",
            "status": "${{ steps.status.outputs.result }}",
            "reason": "${{ steps.reason.outputs.result }}"
          }
          EOF
          )

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "${JSON_PAYLOAD}"
