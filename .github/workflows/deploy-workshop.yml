name: Deploy Workshop to GitHub Pages

permissions: write-all

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of version bump'
        required: true
        type: choice
        options:
          - minor
          - major
        default: minor

jobs:
  deploy:
    name: Build and deploy workshop
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_SSH_KEY }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Setup yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache go dependencies
        uses: actions/cache@v5
        with:
          path: /tmp/hugo_cache
          key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Bump version and create tag
        id: bumpversion
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git pull --rebase

          TAG=$(bump-my-version show new_version --increment "${{ inputs.release_type }}")
          echo "tag_name=${TAG}" >> $GITHUB_OUTPUT

          BASE_URL="$(yq -p=toml -oy .baseURL hugo.toml)"
          echo "base_url=${BASE_URL}" >> $GITHUB_OUTPUT

          # Bump version files and commit (tag is handled below, per .bumpversion.cfg `tag = false`)
          bump-my-version bump "${{ inputs.release_type }}"

          # Update README with new release link
          awk "/Latest versions of the workshop are:/ { print; print \"- [v${TAG}](https://splunk.github.io/observability-workshop/)\";next }1" README.md |
          awk "NR==1,/Latest versions of the workshop are:/{c=3} c&&c-- " > README.new.md
          mv README.new.md README.md

          git fetch --tags origin
          git add README.md
          git commit --amend -m "Releasing v${TAG}"
          git tag -a "v${TAG}" -m "Version ${TAG}"
          git push --follow-tags origin main || { echo 'Push failed. git pull --rebase from upstream and attempt another release.'; exit 1; }

      - name: Clear stale go vcs cache
        run: rm -rf /tmp/hugo_cache/modules/filecache/modules/pkg/mod/cache/vcs

      - name: Build Hugo site
        run: |
          hugo --minify --destination "public" --baseURL "${{ steps.bumpversion.outputs.base_url }}observability-workshop" --noChmod --cacheDir /tmp/hugo_cache

      - name: Promote themed 404 to repo root
        # `defaultContentLanguageInSubdir = true` makes Hugo emit /en/404.html
        # and /ja/404.html but no language-neutral /404.html. GitHub Pages only
        # serves the catch-all from the repo root, so without this copy a
        # bookmarked /repo/en/foo (or /repo/latest/en/foo) hits GitHub's plain
        # text/plain 404 instead of the themed page. Assets in the EN 404 are
        # already absolute (/<repo>/css/…) so the copied page renders fine
        # from the root.
        run: cp public/en/404.html public/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false
          user_name: ${{ github.actor }}
          user_email: ${{ github.actor }}@users.noreply.github.com
          commit_message: "Deploy v${{ steps.bumpversion.outputs.tag_name }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.bumpversion.outputs.tag_name }}
          tag_name: v${{ steps.bumpversion.outputs.tag_name }}
