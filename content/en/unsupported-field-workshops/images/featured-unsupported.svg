<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Network of contributors — Field Workshops">
  <defs>
    <linearGradient id="brand" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="10%" stop-color="#FF007F"/>
      <stop offset="90%" stop-color="#FF9000"/>
    </linearGradient>
    <radialGradient id="bg-bloom" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#FF007F" stop-opacity="0.06"/>
      <stop offset="55%" stop-color="#FF9000" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0C1724" stop-opacity="0"/>
    </radialGradient>
    <!-- Per-node radial gradients for a subtle pulse-glow effect -->
    <radialGradient id="node-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF007F" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FF9000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft accent bloom -->
  <rect width="1600" height="1000" fill="url(#bg-bloom)"/>

  <!-- Connection mesh between contributors. Drawn first so nodes sit on top. -->
  <g fill="none" stroke="url(#brand)" stroke-linecap="round" opacity="0.45">
    <!-- Central hub connects out to most peripheral nodes -->
    <line x1="800" y1="500" x2="380"  y2="280" stroke-width="2"/>
    <line x1="800" y1="500" x2="1230" y2="260" stroke-width="2"/>
    <line x1="800" y1="500" x2="1310" y2="560" stroke-width="2"/>
    <line x1="800" y1="500" x2="1100" y2="800" stroke-width="2"/>
    <line x1="800" y1="500" x2="540"  y2="780" stroke-width="2"/>
    <line x1="800" y1="500" x2="300"  y2="600" stroke-width="2"/>
    <!-- A few peripheral cross-links — community is not a strict hub-and-spoke -->
    <line x1="380"  y1="280" x2="1230" y2="260" stroke-width="1.5" opacity="0.6"/>
    <line x1="1310" y1="560" x2="1100" y2="800" stroke-width="1.5" opacity="0.6"/>
    <line x1="540"  y1="780" x2="300"  y2="600" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Contributor nodes: a glow halo + a filled core. Sizes vary slightly. -->
  <g>
    <!-- Central hub (largest) -->
    <circle cx="800" cy="500" r="80" fill="url(#node-glow)"/>
    <circle cx="800" cy="500" r="34" fill="url(#brand)"/>
    <circle cx="800" cy="500" r="46" fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.55"/>

    <!-- Peripherals -->
    <g>
      <circle cx="380"  cy="280" r="50" fill="url(#node-glow)"/>
      <circle cx="380"  cy="280" r="22" fill="url(#brand)"/>
    </g>
    <g>
      <circle cx="1230" cy="260" r="50" fill="url(#node-glow)"/>
      <circle cx="1230" cy="260" r="24" fill="url(#brand)"/>
    </g>
    <g>
      <circle cx="1310" cy="560" r="50" fill="url(#node-glow)"/>
      <circle cx="1310" cy="560" r="20" fill="url(#brand)"/>
    </g>
    <g>
      <circle cx="1100" cy="800" r="50" fill="url(#node-glow)"/>
      <circle cx="1100" cy="800" r="22" fill="url(#brand)"/>
    </g>
    <g>
      <circle cx="540"  cy="780" r="50" fill="url(#node-glow)"/>
      <circle cx="540"  cy="780" r="22" fill="url(#brand)"/>
    </g>
    <g>
      <circle cx="300"  cy="600" r="50" fill="url(#node-glow)"/>
      <circle cx="300"  cy="600" r="18" fill="url(#brand)"/>
    </g>
  </g>

  <!-- Sprinkle of small distant nodes for depth -->
  <g fill="url(#brand)" opacity="0.55">
    <circle cx="160"  cy="180" r="5"/>
    <circle cx="1480" cy="120" r="4"/>
    <circle cx="1440" cy="880" r="5"/>
    <circle cx="140"  cy="900" r="4"/>
  </g>
</svg>
